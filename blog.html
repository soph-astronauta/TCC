<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comunidade de Intercambistas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --blue:#0B4DDB;
    --blue-dark:#0738A5;
    --red:#E63946;
    --light:#F5F8FF;
    --gray:#667085;
    --dark:#101828;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:var(--light);
}

/* TOPBAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 20px;
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:45px;
    height:45px;
}

.nav-buttons{
    display:flex;
    gap:10px;
}

.nav-btn{
    text-decoration:none;
    padding:10px 16px;
    border-radius:12px;
    font-weight:600;
}

.back{
    background:#e5e7eb;
    color:#111;
}

.home{
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));
    color:white;
}

/* BOTÃO PUBLICAR */
.publish-btn{
    position:fixed;
    right:20px;
    bottom:20px;
   background: #61373a;
    color:white;
    border:none;
    padding:15px 18px;
    border-radius:50px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
    z-index:2000;
}

/* HERO */
.hero{
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));
    color:white;
    padding:70px 20px;
    text-align:center;
}

/* LAYOUT */
.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

/* POST */
.post{
    background:white;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.post img{
    width:100%;
    height:260px;
    object-fit:cover;
}

.content{
    padding:25px;
}

.tag{
    background:#edf3ff;
    color:var(--blue);
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
    display:inline-block;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.btn{
    border:none;
    cursor:pointer;
    padding:10px 14px;
    border-radius:10px;
    font-weight:600;
}

.like{
    background:#ffe5e7;
    color:var(--red);
}

/* REAÇÕES */
.reaction-box{
    display:none;
    gap:8px;
    margin-top:10px;
}

.reaction{
    font-size:18px;
    cursor:pointer;
    background:#f1f5f9;
    padding:6px 10px;
    border-radius:8px;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.6);
    justify-content:center;
    align-items:center;
    z-index:3000;
}

.modal-content{
    background:white;
    padding:25px;
    border-radius:15px;
    width:90%;
    max-width:500px;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ddd;
}

/* SIDEBAR */
aside{
    margin-top:30px;
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

<div class="logo">
    <img src="img/logotipo.png">
    <span>INTERWAY</span>
</div>

<div class="nav-buttons">
    <a href="javascript:history.back()" class="nav-btn back">⬅ Voltar</a>
    <a href="index.html" class="nav-btn home"> Home</a>
</div>

</div>

<!-- HERO -->
<div class="hero">
<h1> Comunidade de Intercambistas</h1>
<p>Compartilhe, curta e viva experiências reais</p>
</div>

<!-- FEED -->
<div class="container" id="feed">

<!-- POST EXEMPLO -->
<div class="post" data-likes="124">

<img src="https://images.unsplash.com/photo-1513635269975-59663e0ac1ad">

<div class="content">

<span class="tag">🇬🇧 Inglaterra</span>
<h2>Minha experiência em Londres</h2>
<p>8 meses estudando inglês.</p>

<div class="actions">
<button class="btn like" onclick="likePost(this)">
❤️ Curtir (<span class="counter">124</span>)
</button>

<button class="btn" onclick="toggleReactions(this)">😄 Reagir</button>
</div>

<div class="reaction-box">
<span class="reaction" onclick="react(this)">😍</span>
<span class="reaction" onclick="react(this)">🔥</span>
<span class="reaction" onclick="react(this)">👏</span>
</div>

</div>
</div>

</div>

<!-- BOTÃO PUBLICAR -->
<button class="publish-btn" onclick="openModal()">+ Publicar Relato</button>

<!-- MODAL -->
<div class="modal" id="modal">

<div class="modal-content">

<h2>Publicar Relato</h2>

<input type="text" id="titulo" placeholder="Título">
<select id="pais">
<option>Canadá</option>
<option>EUA</option>
<option>Inglaterra</option>
<option>Austrália</option>
<option>Irlanda</option>
</select>

<textarea id="texto" placeholder="Sua experiência"></textarea>
<input type="text" id="img" placeholder="URL da imagem">

<button onclick="addPost()">Publicar</button>
<button onclick="closeModal()" style="margin-top:10px;background:#ddd;">Fechar</button>

</div>

</div>

<script>

function likePost(btn){
    let counter = btn.querySelector(".counter");
    counter.innerText = parseInt(counter.innerText) + 1;
}

function toggleReactions(btn){
    let box = btn.parentElement.nextElementSibling;
    box.style.display = box.style.display === "flex" ? "none" : "flex";
}

function react(el){
    el.style.transform = "scale(1.4)";
    setTimeout(()=> el.style.transform="scale(1)",200);
}

/* MODAL */
function openModal(){
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

/* NOVO POST */
function addPost(){

    const titulo = document.getElementById("titulo").value;
    const pais = document.getElementById("pais").value;
    const texto = document.getElementById("texto").value;
    const img = document.getElementById("img").value;

    const post = document.createElement("div");
    post.className = "post";

    post.innerHTML = `
        <img src="${img}">
        <div class="content">
        <span class="tag">🌎 ${pais}</span>
        <h2>${titulo}</h2>
        <p>${texto}</p>

        <div class="actions">
        <button class="btn like" onclick="likePost(this)">
        ❤️ Curtir (<span class="counter">0</span>)
        </button>
        <button class="btn" onclick="toggleReactions(this)">😄 Reagir</button>
        </div>

        <div class="reaction-box">
        <span class="reaction" onclick="react(this)">😍</span>
        <span class="reaction" onclick="react(this)">🔥</span>
        <span class="reaction" onclick="react(this)">👏</span>
        </div>

        </div>
    `;

    document.getElementById("feed").prepend(post);

    closeModal();
}

</script>

</body>
</html>
