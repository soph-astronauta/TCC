<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Interway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --blue:#0B4DDB;
    --blue-dark:#0738A5;
    --gray:#667085;
    --dark:#101828;
    --light:#F5F8FF;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#eaf1ff,#f5f8ff);
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* TOPBAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 20px;
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.nav-buttons{
    display:flex;
    gap:10px;
}

.nav-btn{
    text-decoration:none;
    padding:10px 16px;
    border-radius:12px;
    font-weight:600;
}

.back{
    background:#e5e7eb;
    color:#111;
}

.home{
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));
    color:white;
}

/* CENTER CONTAINER */
.container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* LOGIN BOX */
.login-box{
    width:100%;
    max-width:380px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.1);
    text-align:center;
}

/* LOGO */
.logo{
    margin-bottom:15px;
}

.logo img{
    width:90px;
    height:90px;
    object-fit:contain;
}

/* TITLE */
h2{
    margin-bottom:20px;
    color:var(--dark);
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border-radius:12px;
    border:1px solid #ddd;
    outline:none;
    font-size:14px;
}

/* BUTTONS */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.login-btn{
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));
    color:white;
}

.login-btn:hover{
    transform:translateY(-2px);
}

/* SECONDARY BUTTON */
.area-btn{
    margin-top:10px;
    background:#111827;
    color:white;
}

.area-btn:hover{
    opacity:0.9;
}

/* CADASTRO BUTTON */
.cadastro-btn{
    margin-top:10px;
    background:linear-gradient(135deg,#10b981,#059669);
    color:white;
}

.cadastro-btn:hover{
    transform:translateY(-2px);
    filter:brightness(1.1);
}

/* SMALL TEXT */
.small{
    font-size:12px;
    color:var(--gray);
    margin-top:10px;
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

<div class="nav-buttons">
    <a href="javascript:history.back()" class="nav-btn back">⬅ Voltar</a>
</div>

<div class="nav-buttons">
    <a href="index.html" class="nav-btn home">🏠 Home</a>
</div>

</div>

<!-- LOGIN -->
<div class="container">

<div class="login-box">

<!-- LOGO -->
<div class="logo">
    <img src="img/logotipo.png" alt="Logo Interway">
</div>

<h2>Entrar na sua conta</h2>

<input type="email" id="email" placeholder="E-mail">
<input type="password" id="senha" placeholder="Senha">

<button class="login-btn" onclick="login()">Entrar</button>

<button class="cadastro-btn" onclick="cadastro()">Cadastre-se</button>

<button class="area-btn" onclick="area()">Acessar área específica</button>

<div class="small">
Ainda não tem conta? Crie uma agora e participe da comunidade.
</div>

</div>

</div>

<script>

// LOGIN SIMULADO
function login(){

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    if(!email || !senha){
        alert("Preencha todos os campos!");
        return;
    }

    localStorage.setItem("logged", "true");

    alert("Login realizado com sucesso!");

    window.location.href = "index.html";
}

// IR PARA CADASTRO
function cadastro(){
    window.location.href = "cadastro.html";
}

// ÁREA ESPECÍFICA
function area(){
    const choice = prompt("Digite a área desejada:\n1 - Comunidade\n2 - Chat\n3 - Bolsas\n4 - Destinos");

    switch(choice){
        case "1":
            window.location.href = "comunidade.html";
            break;
        case "2":
            window.location.href = "chat.html";
            break;
        case "3":
            window.location.href = "bolsas.html";
            break;
        case "4":
            window.location.href = "destinos.html";
            break;
        default:
            alert("Área inválida!");
    }
}

</script>

</body>
</html>
