<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro - Interway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --blue:#0B4DDB;
    --blue-dark:#0738A5;
    --gray:#667085;
    --dark:#101828;
    --light:#F5F8FF;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#eaf1ff,#f5f8ff);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* TOPBAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 20px;
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.nav-buttons{
    display:flex;
    gap:10px;
}

.nav-btn{
    text-decoration:none;
    padding:10px 16px;
    border-radius:12px;
    font-weight:600;
}

.back{
    background:#e5e7eb;
    color:#111;
}

.home{
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));
    color:white;
}

/* CONTAINER */
.container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

/* BOX */
.box{
    width:100%;
    max-width:420px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.1);
    text-align:center;
}

/* LOGO */
.logo{
    margin-bottom:10px;
}

.logo img{
    width:80px;
    height:80px;
    object-fit:contain;
}

/* TITLE */
h2{
    margin-bottom:15px;
    color:var(--dark);
}

/* INPUTS */
input, select{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    border:1px solid #ddd;
    outline:none;
    font-size:14px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));
    color:white;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

/* MSG */
.msg{
    margin-top:10px;
    font-size:13px;
    color:green;
    display:none;
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

<div class="nav-buttons">
    <a href="javascript:history.back()" class="nav-btn back"> Voltar</a>
</div>

<div class="nav-buttons">
    <a href="index.html" class="nav-btn home"> Home</a>
</div>

</div>

<!-- CONTAINER -->
<div class="container">

<div class="box">

<!-- LOGO -->
<div class="logo">
    <img src="img/logotipo.png" alt="Logo Interway">
</div>

<h2>Criar Conta</h2>

<input type="text" id="nome" placeholder="Nome completo">
<input type="email" id="email" placeholder="E-mail">

<select id="pais">
    <option value="">Selecione seu país</option>
    <option>Brasil</option>
    <option>Canadá</option>
    <option>Estados Unidos</option>
    <option>Irlanda</option>
    <option>Austrália</option>
    <option>Inglaterra</option>
    <option>Malta</option>
</select>

<input type="password" id="senha" placeholder="Senha">
<input type="password" id="confirmar" placeholder="Confirmar senha">

<button onclick="window.location.href='chat_intercambistas.html'">Criar conta</button>
<div class="msg" id="msg">Cadastro realizado com sucesso!</div>

</div>

</div>

<script>

function cadastro(){

    const nome = document.getElementById("nome").value;
    const email = document.getElementById("email").value;
    const pais = document.getElementById("pais").value;
    const senha = document.getElementById("senha").value;
    const confirmar = document.getElementById("confirmar").value;

    if(!nome || !email || !pais || !senha || !confirmar){
        alert("Preencha todos os campos!");
        return;
    }

    if(senha !== confirmar){
        alert("As senhas não coincidem!");
        return;
    }

    // salvar simulado
    localStorage.setItem("user", JSON.stringify({nome,email,pais}));

    document.getElementById("msg").style.display = "block";

    setTimeout(()=>{
        window.location.href = "comunidade.html";
    },1500);
}

</script>

</body>
</html>
