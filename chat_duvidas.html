<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat de Intercâmbio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0b0f1a;
    --card:#111827;
    --user:#3b82f6;
    --bot:#1f2937;
    --text:#e5e7eb;
    --muted:#9ca3af;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: radial-gradient(circle at top, #060757, var(--bg));
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* CHAT BOX */
.chat-container{
    width:90%;
    max-width:600px;
    height:85vh;
    background:var(--card);
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* HEADER MELHORADO */
.chat-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 15px;
    background:linear-gradient(90deg,var(--user),#000000);
    color:white;
    font-weight:600;
}

/* LOGO AREA */
.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:40px;
    height:40px;
    object-fit:contain;
}

/* BOTÕES HEADER */
.nav-buttons{
    display:flex;
    gap:8px;
}

.nav-buttons a{
    text-decoration:none;
    font-size:12px;
    padding:8px 10px;
    border-radius:10px;
    font-weight:600;
    transition:.3s;
    color:white;
}

.back-btn{
    background:rgba(255,255,255,0.15);
}

.home-btn{
    background:#3b82f6;
}

.nav-buttons a:hover{
    transform:translateY(-2px);
}

/* CHAT */
.chat-box{
    flex:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* MSG */
.msg{
    max-width:80%;
    padding:12px 15px;
    border-radius:15px;
    font-size:14px;
    line-height:1.4;
    animation:fade .3s ease;
}

.user{
    background:var(--user);
    color:white;
    align-self:flex-end;
    border-bottom-right-radius:5px;
}

.bot{
    background:var(--bot);
    color:var(--text);
    align-self:flex-start;
    border-bottom-left-radius:5px;
}

/* INPUT */
.input-box{
    display:flex;
    padding:15px;
    background:#0f172a;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    outline:none;
    background:#1f2937;
    color:white;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    background:var(--user);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    filter:brightness(1.2);
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="chat-container">

<!-- HEADER -->
<div class="chat-header">

    <!-- LOGO -->
    <div class="logo">
        <img src="img/logotipo.png" alt="logo">
        <span>INTERWAY CHAT</span>
    </div>

    <!-- BOTÕES -->
    <div class="nav-buttons">
        <a href="javascript:history.back()" class="back-btn">⬅ Voltar</a>
        <a href="index.html" class="home-btn">🏠 Home</a>
    </div>

</div>

<!-- CHAT -->
<div class="chat-box" id="chatBox">

<div class="msg bot">
Olá! 👋 Me pergunte sobre países, bolsas, cursos ou intercâmbio.
</div>

</div>

<!-- INPUT -->
<div class="input-box">
<input type="text" id="input" placeholder="Digite sua pergunta...">
<button onclick="sendMessage()">Enviar</button>
</div>

</div>

<script>

const chatBox = document.getElementById("chatBox");
const input = document.getElementById("input");

function addMessage(text, type){
    const div = document.createElement("div");
    div.classList.add("msg", type);
    div.innerText = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function getResponse(msg){

    msg = msg.toLowerCase();

    if(msg.includes("canadá")){
        return "🇨🇦 O Canadá é um dos melhores destinos para intercâmbio com possibilidade de trabalho durante os estudos.";
    }

    if(msg.includes("inglês")){
        return "📚 Você pode aprender inglês em EUA, Inglaterra, Irlanda, Canadá, Austrália e Malta.";
    }

    if(msg.includes("bolsa")){
        return "🎓 Existem bolsas em universidades como Harvard, Oxford e Toronto.";
    }

    if(msg.includes("preço") || msg.includes("custo")){
        return "💰 O custo varia por país, mas existem opções acessíveis e bolsas de estudo.";
    }

    return "🤔 Posso te ajudar com países, bolsas, cursos e destinos de intercâmbio!";
}

function sendMessage(){

    const text = input.value.trim();
    if(text === "") return;

    addMessage(text, "user");
    input.value = "";

    setTimeout(() => {
        addMessage(getResponse(text), "bot");
    }, 600);
}

input.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});

</script>

</body>
</html>
